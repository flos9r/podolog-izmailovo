<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Нейтральный фон -->
  <rect width="200" height="200" fill="#F5F5F5"/>

  <!-- Основная форма пальца (телесный цвет) -->
  <path d="M 60,170 C 40,150 30,120 40,90 S 60,30 90,40 S 150,60 160,90 S 170,150 140,170 Z" fill="#F0DBC7" stroke="#6D6875" stroke-width="2"/>

  <!-- Ноготь (мягкий розовый/бежевый) -->
  <path d="M 75,110 C 70,80 90,60 115,65 S 145,85 140,115 L 75,125 Z" fill="#FFF8F2" stroke="#B5838D" stroke-width="1.5"/>

  <!-- Зона вросшего ногтя и воспаления -->
  <!-- Слегка "врезающийся" край ногтя -->
  <path d="M 75,110 C 76,115 78,125 75,125 L 72,128 C 70,120 72,112 75,110 Z" fill="#FFF8F2" stroke="#B5838D" stroke-width="1.5"/>

  <!-- Деликатное воспаление/покраснение (приглушенный красный) -->
  <path d="M 72,128 C 65,135 60,145 65,155 C 70,150 75,140 72,128 Z" fill="#E5989B" opacity="0.6" stroke="#E5989B" stroke-width="1" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Акцентная линия, показывающая проблему (более темный красный) -->
  <path d="M 73,120 C 70,128 72,135 75,138" fill="none" stroke="#D90429" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
</svg>